<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f1629;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0e1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#818cf8;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0" />
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)" />
  <rect width="1200" height="400" fill="url(#glow)" />

  <!-- Stars -->
  <circle cx="80" cy="50" r="1" fill="#fff" opacity="0.6" />
  <circle cx="200" cy="120" r="0.8" fill="#fff" opacity="0.4" />
  <circle cx="350" cy="30" r="1.2" fill="#fff" opacity="0.5" />
  <circle cx="500" cy="90" r="0.7" fill="#fff" opacity="0.3" />
  <circle cx="650" cy="45" r="1" fill="#fff" opacity="0.5" />
  <circle cx="780" cy="110" r="0.9" fill="#fff" opacity="0.4" />
  <circle cx="900" cy="25" r="1.1" fill="#fff" opacity="0.6" />
  <circle cx="1050" cy="80" r="0.8" fill="#fff" opacity="0.3" />
  <circle cx="1150" cy="50" r="1" fill="#fff" opacity="0.5" />
  <circle cx="150" cy="200" r="0.6" fill="#fff" opacity="0.3" />
  <circle cx="300" cy="250" r="0.9" fill="#fff" opacity="0.4" />
  <circle cx="450" cy="300" r="0.7" fill="#fff" opacity="0.3" />
  <circle cx="600" cy="280" r="1" fill="#fff" opacity="0.4" />
  <circle cx="750" cy="320" r="0.8" fill="#fff" opacity="0.3" />
  <circle cx="950" cy="260" r="0.7" fill="#fff" opacity="0.4" />
  <circle cx="1100" cy="300" r="1" fill="#fff" opacity="0.5" />
  <circle cx="100" cy="350" r="0.8" fill="#fff" opacity="0.3" />
  <circle cx="850" cy="180" r="0.6" fill="#fff" opacity="0.4" />

  <!-- Shooting star (meteor) -->
  <line x1="320" y1="60" x2="380" y2="90" stroke="url(#accent)" stroke-width="2" filter="url(#blur)" />
  <circle cx="380" cy="90" r="2" fill="#818cf8" opacity="0.8" filter="url(#blur)" />

  <!-- Accent line -->
  <rect x="100" y="230" width="1000" height="1" fill="url(#accent)" />

  <!-- Title -->
  <text x="600" y="180" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#e2e8f0" text-anchor="middle" letter-spacing="8">
    ASTERIA
  </text>

  <!-- Subtitle -->
  <text x="600" y="260" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="20" fill="#94a3b8" text-anchor="middle" letter-spacing="3">
    MCP SERVER FOR PERPLEXITY COMET
  </text>

  <!-- Tagline -->
  <text x="600" y="300" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" fill="#64748b" text-anchor="middle" letter-spacing="1">
    Control Comet's agentic browser from any AI assistant via Chrome DevTools Protocol
  </text>
</svg>
